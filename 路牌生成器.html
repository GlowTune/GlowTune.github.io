<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>路牌生成器 by Caelara_Lab</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f7fa;padding:20px;text-align:center;}
.panel{background:#fff;padding:20px;border-radius:10px;max-width:520px;margin:0 auto 20px;box-shadow:0 2px 12px rgba(0,0,0,0.1);}
.mode-bar{display:flex;gap:8px;margin-bottom:15px;}
.tab{flex:1;padding:10px;border-radius:6px;border:none;cursor:pointer;background:#eee;font-size:15px;}
.tab.active{background:#005EA5;color:#fff;}
input,select{width:100%;padding:11px;margin:8px 0;border:1px #dcdfe6 solid;border-radius:6px;font-size:16px;outline:none;}
.btn-row{display:flex;gap:10px;margin-top:15px;}
button{flex:1;padding:11px;border:none;border-radius:6px;cursor:pointer;font-size:15px;}
.down{background:#0958d9;color:#fff;}
.reset{background:#e5e7eb;color:#333;}
.preview-box{width:400px;height:200px;margin:20px auto;border-radius:20px;overflow:hidden;}
.show-content{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.font-top{font-family:"DIN Condensed","方正交通黑","方正粗黑简体",sans-serif;font-weight:900;letter-spacing:2px;}
.hide{display:none;}
.note{max-width:520px;margin:10px auto;font-size:12px;color:#555;text-align:left;line-height:1.6;}
canvas{display:none;}
</style>
</head>
<body>
<div class="panel">
<div class="mode-bar">
<button class="tab active" onclick="switchMode('city')">城市路牌</button>
<button class="tab" onclick="switchMode('road')">公路编号牌</button>
</div>

<div id="cityInput">
<input type="text" id="cityName" placeholder="输入街道名称：如济南路">
</div>

<div id="roadInput" class="hide">
<select id="roadType">
<option value="g">国道 G</option>
<option value="s">省道 S</option>
<option value="x">县道 X</option>
<option value="y">乡道 Y</option>
<option value="c">村道 C</option>
</select>
<input type="text" id="roadNum" placeholder="仅输入数字编号" maxlength="4" oninput="value=value.replace(/\D/g,'')">
</div>

<div class="btn-row">
<button class="down" onclick="saveHD()">下载1:1核对高清图</button>
<button class="reset" onclick="resetAll()">重置</button>
</div>
</div>

<p>实时预览（与国标手册参数一致）</p>
<div class="preview-box" id="preWrap">
<div class="show-content font-top" id="preText" style="background:#005EA5;color:#fff;font-size:72px;">济南路</div>
</div>

<div class="note">
公告<br>
仅供个人使用，不得用于商业用途<br>

</div>

<canvas id="hdCanvas" width="2000" height="1000"></canvas>

<script>
let nowMode = "city";
const cityIn = document.getElementById("cityInput");
const roadIn = document.getElementById("roadInput");
const cityTxt = document.getElementById("cityName");
const roadSel = document.getElementById("roadType");
const roadNum = document.getElementById("roadNum");
const preText = document.getElementById("preText");
const canvas = document.getElementById("hdCanvas");
const ctx = canvas.getContext("2d");

const colorLib = {
city: {bg:"#005EA5",txt:"#FFFFFF"},
g:{out:"#FFFFFF",bg:"#E60012",txt:"#FFFFFF"},
s:{out:"#000000",bg:"#FFD100",txt:"#000000"},
x:{out:"#000000",bg:"#FFFFFF",txt:"#000000"},
y:{out:"#000000",bg:"#FFFFFF",txt:"#000000"},
c:{out:"#000000",bg:"#FFFFFF",txt:"#000000"}
};


const HD_W = 2000;
const HD_H = 1000;
const RADIUS = HD_H / 10;     // 圆角：高÷10
const BORDER_W = HD_H / 16;   // 衬边：高÷16


function switchMode(m){
nowMode = m;
document.querySelectorAll(".tab")[0].classList.toggle("active",m==="city");
document.querySelectorAll(".tab")[1].classList.toggle("active",m==="road");
cityIn.classList.toggle("hide",m!=="city");
roadIn.classList.toggle("hide",m==="city");
resetAll();
updatePre();
}

function updatePre(){
if(nowMode==="city"){
let t = cityTxt.value || "济南路";
preText.style.background = colorLib.city.bg;
preText.style.color = colorLib.city.txt;
preText.style.fontSize = "72px";
preText.innerText = t;
}else{
let type = roadSel.value;
let num = roadNum.value || "220";
let t = type + num.toUpperCase();
preText.style.background = colorLib[type].out;
preText.style.color = colorLib[type].txt;
preText.style.fontSize = "110px";
preText.innerHTML = `<div style="width:calc(100%-24px);height:calc(100%-24px);background:${colorLib[type].bg};border-radius:12px;display:flex;align-items:center;justify-content:center;">${t}</div>`;
}
}

function saveHD(){
ctx.clearRect(0,0,HD_W,HD_H);
if(nowMode==="city"){
let text = cityTxt.value || "济南路";
let c = colorLib.city;

ctx.fillStyle = c.bg;
ctx.beginPath();
ctx.roundRect(0,0,HD_W,HD_H,RADIUS);
ctx.fill();
ctx.fillStyle = c.txt;
ctx.font = "900 360px DIN Condensed,方正交通黑,sans-serif";
ctx.textAlign = "center";ctx.textBaseline = "middle";
ctx.fillText(text,HD_W/2,HD_H/2);
}else{
let type = roadSel.value;
let num = roadNum.value || "220";
let text = type.toUpperCase() + num;
let c = colorLib[type];

ctx.fillStyle = c.out;
ctx.beginPath();
ctx.roundRect(0,0,HD_W,HD_H,RADIUS);
ctx.fill();

ctx.fillStyle = c.bg;
ctx.beginPath();
ctx.roundRect(BORDER_W,BORDER_W,HD_W-BORDER_W*2,HD_H-BORDER_W*2,RADIUS - BORDER_W/2);
ctx.fill();

ctx.fillStyle = c.txt;
ctx.font = "900 520px DIN Condensed,方正交通黑,sans-serif";
ctx.textAlign = "center";ctx.textBaseline = "middle";
ctx.fillText(text,HD_W/2,HD_H/2);
}
let a = document.createElement("a");
a.download = "路牌生成器"+Date.now()+".png";
a.href = canvas.toDataURL("image/png",1.0);
a.click();
}


function resetAll(){
cityTxt.value = "";roadNum.value = "";roadSel.value = "g";
updatePre();
}

cityTxt.oninput = updatePre;
roadSel.onchange = updatePre;
roadNum.oninput = updatePre;
updatePre();
</script>
</body>
</html>
