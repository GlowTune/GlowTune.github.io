<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caelara Lab</title>
    <!-- 解决docx导入乱码依赖库 -->
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <style>
        :root {
            --android-primary: #2979FF;
            --android-primary-dark: #1976D2;
            --android-surface: #FFFFFF;
            --android-background: #F5F5F5;
            --android-on-surface: #212121;
            --android-on-surface-secondary: #757575;
            --android-search-bar: #F0F0F0;
            --android-radius: 24px;
            --android-card-radius: 16px;
            --transition-standard: 0.2s cubic-bezier(0.2, 0, 0, 1);
            --shadow-1: 0 1px 3px rgba(0,0,0,0.12);
            --shadow-2: 0 3px 6px rgba(0,0,0,0.16);
            --toolbar-text: #FFFFFF;
        }
        [data-theme="dark"] {
            /* 深色模式仅切换背景文字，主题色固定不变 */
            --android-surface: #1E1E1E;
            --android-background: #121212;
            --android-on-surface: #E1E1E1;
            --android-on-surface-secondary: #9E9E9E;
            --android-search-bar: #2D2D2E;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans SC', 'Roboto', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: var(--android-background);
            color: var(--android-on-surface);
            transition: var(--transition-standard);
            overflow-x: hidden;
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .page-container {
            background: rgba(255,255,255,0.85);
            min-height: 100vh;
            transition: var(--transition-standard);
        }
        [data-theme="dark"] .page-container {
            background: rgba(18,18,18,0.85);
        }
        /* 顶部工具栏 */
        .android-toolbar {
            position: sticky;
            top: 0;
            z-index: 90;
            width: 100%;
            height: 56px;
            background: var(--android-primary);
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-shadow: var(--shadow-1);
            transition: background var(--transition-standard);
        }
        .toolbar-menu-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--toolbar-text);
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-standard);
            position: relative;
            overflow: hidden;
        }
        .toolbar-menu-btn:active {
            background: rgba(255,255,255,0.1);
        }
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }
        @keyframes ripple {to{transform:scale(4);opacity:0}}
        .toolbar-title {
            font-size: 20px;
            font-weight: 500;
            color: var(--toolbar-text);
            margin-left: 16px;
        }
        /* 侧边抽屉 */
        .android-drawer {
            position: fixed;
            top: 0;
            left: -260px;
            width: 260px;
            height: 100vh;
            background: var(--android-surface);
            z-index: 100;
            transition: left var(--transition-standard);
            box-shadow: var(--shadow-2);
        }
        .android-drawer.active {left:0;}
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0,0,0,0.4);
            z-index: 95;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-standard);
        }
        .drawer-overlay.active {opacity:1;visibility:visible;}
        .drawer-header {
            height: 140px;
            background: var(--android-primary);
            padding: 24px 16px;
            display: flex;
            align-items: flex-end;
            color: var(--toolbar-text);
            font-size: 20px;
            font-weight: 500;
        }
        .drawer-nav {padding:12px 0;}
        .drawer-item {
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            margin: 0 8px;
            border-radius: var(--android-radius);
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition-standard);
            position: relative;
            overflow: hidden;
        }
        .drawer-item.active {
            background: rgba(41,121,255,0.12);
            color: var(--android-primary);
            font-weight: 500;
        }
        .drawer-item:hover {background:rgba(0,0,0,0.05);}
        [data-theme="dark"] .drawer-item:hover {background:rgba(255,255,255,0.05);}
        /* 搜索模块 */
        .search-main-head {
            padding: 28px 24px 16px;
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            color: var(--android-on-surface);
        }
        .android-search {
            margin: 0 24px 16px;
            height: 56px;
            display: flex;
            align-items: center;
            background: var(--android-search-bar);
            border-radius: var(--android-radius);
            overflow: hidden;
            box-shadow: var(--shadow-1);
            transition: var(--transition-standard);
        }
        .search-input {
            flex:1;
            height:100%;
            padding:0 24px;
            border:none;
            background:transparent;
            outline:none;
            font-size:16px;
            color:var(--android-on-surface);
        }
        .search-input::placeholder {color:var(--android-on-surface-secondary);}
        .search-submit {
            width:96px;
            height:100%;
            background:var(--android-primary);
            border:none;
            color: var(--toolbar-text);
            font-size:16px;
            font-weight:500;
            cursor:pointer;
            transition:var(--transition-standard);
            position:relative;
            overflow:hidden;
        }
        .search-submit:active {background:var(--android-primary-dark);}
        .search-tags {
            margin:0 24px 20px;
            display:flex;
            flex-wrap:wrap;
            gap:8px;
        }
        .search-tag {
            padding:8px 16px;
            background:var(--android-surface);
            border:1px solid var(--android-primary);
            border-radius:20px;
            font-size:14px;
            color:var(--android-primary);
            cursor:pointer;
            transition:var(--transition-standard);
        }
        .search-tag:hover {background:var(--android-primary);color: var(--toolbar-text);}
        /* 活动卡片 */
        .activity-section{margin:0 24px 24px;background:var(--android-surface);border-radius:var(--android-card-radius);overflow:hidden;box-shadow:var(--shadow-1);transition:var(--transition-standard)}
        .activity-img{width:100%;height:180px;object-fit:cover;display:block}
        .activity-text{padding:14px 16px;font-size:17px;font-weight:50;color:var(--android-on-surface)}
        /* 文章列表 */
        .articles-wrap {
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
            gap:20px;
            padding:0 24px 32px;
        }
        .article-card {
            background:var(--android-surface);
            border-radius:var(--android-card-radius);
            overflow:hidden;
            box-shadow:var(--shadow-1);
            transition:var(--transition-standard);
            cursor:pointer;
        }
        .article-card.hide {display:none;}
        .article-card:hover {box-shadow:var(--shadow-2);transform:translateY(-2px);}
        .article-card-img {
            width:100%;
            height:160px;
            object-fit:cover;
            display:block;
        }
        .article-card-content {padding:16px;}
        .article-card-title {
            font-size:16px;
            font-weight:500;
            margin-bottom:6px;
            color:var(--android-on-surface);
        }
        .article-card-desc {
            font-size:14px;
            color:var(--android-on-surface-secondary);
            display:-webkit-box;
            -webkit-line-clamp:2;
            -webkit-box-orient:vertical;
            overflow:hidden;
        }
        /* 页面切换动画 */
        .page {display:none;animation:pageFade 0.2s ease forwards;}
        .page.active {display:block;}
        @keyframes pageFade {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .empty-tip {
            text-align:center;
            padding:60px 0;
            color:var(--android-on-surface-secondary);
            grid-column:1/-1;
            font-size:15px;
        }
        .empty-tip.hide {display:none;}
        /* 发布表单 */
        .publish-layout {
            padding:24px;
            max-width:800px;
            margin:0 auto;
        }
        .form-group {margin-bottom:24px;}
        .form-label {
            display:block;
            margin-bottom:8px;
            font-size:16px;
            font-weight:500;
            color:var(--android-on-surface);
        }
        .form-label span {color:#f44336;}
        .form-input {
            width:100%;
            height:52px;
            padding:0 16px;
            border:none;
            border-radius:var(--android-card-radius);
            background:var(--android-surface);
            font-size:16px;
            color:var(--android-on-surface);
            box-shadow:var(--shadow-1);
            outline:none;
            transition:var(--transition-standard);
        }
        .form-input:focus {box-shadow:0 0 0 2px var(--android-primary);}
        .form-select {
            width:100%;
            height:52px;
            padding:0 16px;
            border:none;
            border-radius:var(--android-card-radius);
            background:var(--android-surface);
            font-size:16px;
            color:var(--android-on-surface);
            box-shadow:var(--shadow-1);
            outline:none;
        }
        .cover-box {
            display:flex;
            align-items:center;
            gap:20px;
            margin-top:8px;
            flex-wrap:wrap;
        }
        #coverPreview {
            width:140px;
            height:140px;
            border-radius:var(--android-card-radius);
            object-fit:cover;
            background:var(--android-surface);
            box-shadow:var(--shadow-1);
        }
        .upload-btn {
            padding:12px 24px;
            background:var(--android-primary);
            color: var(--toolbar-text);
            border:none;
            border-radius:var(--android-radius);
            cursor:pointer;
            transition:var(--transition-standard);
        }
        .upload-btn:hover {background:var(--android-primary-dark);}
        .word-import-btn {
            padding:12px 24px;
            background:var(--android-primary);
            color: var(--toolbar-text);
            border:none;
            border-radius:var(--android-radius);
            cursor:pointer;
            transition:var(--transition-standard);
            margin-left:8px;
        }
        .word-import-btn:hover {background:var(--android-primary-dark);}
        /* 文章编辑工具栏【优化核心】 */
        .editor-toolbar {
            height:auto;
            min-height:48px;
            background:var(--android-surface);
            border-radius:var(--android-card-radius) var(--android-card-radius) 0 0;
            display:flex;
            align-items:center;
            padding:8px 16px;
            gap:8px;
            box-shadow:var(--shadow-1);
            flex-wrap:wrap;
        }
        .editor-btn {
            width:36px;
            height:36px;
            border-radius:50%;
            background:transparent;
            border:none;
            color:var(--android-on-surface);
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition: var(--transition-standard);
        }
        .editor-btn.active {color:var(--android-primary);background:rgba(41,121,255,0.1);}
        .editor-btn:hover {background:rgba(0,0,0,0.05);}
        [data-theme="dark"] .editor-btn:hover {background:rgba(255,255,255,0.05);}
        .form-textarea {
            width:100%;
            min-height:220px;
            padding:16px;
            border:none;
            border-radius:0 0 var(--android-card-radius) var(--android-card-radius);
            background:var(--android-surface);
            font-size:16px;
            line-height:1.8;
            color:var(--android-on-surface);
            box-shadow:var(--shadow-1);
            resize:vertical;
            outline:none;
        }
        .photo-group {margin-top:12px;display:flex;flex-wrap:wrap;gap:12px;}
        .photo-item {width:100px;height:100px;border-radius:var(--android-card-radius);object-fit:cover;box-shadow:var(--shadow-1);}
        .code-lang {width:160px;height:42px;padding:0 12px;border-radius:12px;background:var(--android-surface);border:none;box-shadow:var(--shadow-1);outline:none;margin-top:12px;}
        .code-textarea {width:100%;min-height:120px;padding:16px;border-radius:var(--android-card-radius);background:#1E1E1E;color:#E1E1E1;font-family:monospace;font-size:14px;line-height:1.6;box-shadow:var(--shadow-1);resize:vertical;outline:none;margin-top:8px;}
        [data-theme="dark"] .code-textarea {background:#2D2D2D;}
        .btn-group {
            display:flex;
            gap:16px;
            margin-top:32px;
            flex-wrap:wrap;
        }
        .draft-btn,.submit-btn {
            flex:1;
            min-width:120px;
            height:56px;
            border:none;
            border-radius:var(--android-radius);
            font-size:16px;
            font-weight:500;
            cursor:pointer;
            transition:var(--transition-standard);
        }
        .draft-btn {background:#9AA0B0;color:#fff;}
        .draft-btn:hover {background:#7B808C;}
        .submit-btn {background:var(--android-primary);color: var(--toolbar-text);}
        .submit-btn:hover {background:var(--android-primary-dark);}
        /* 详情页 */
        .detail-photos {display:flex;flex-wrap:wrap;gap:16px;margin:20px 0;}
        .detail-photo {width:200px;height:200px;border-radius:var(--android-card-radius);object-fit:cover;box-shadow:var(--shadow-1);}
        .detail-code {background:#1E1E1E;color:#E1E1E1;padding:20px;border-radius:var(--android-card-radius);margin:20px 0;font-family:monospace;line-height:1.6;white-space:pre-wrap;}
        [data-theme="dark"] .detail-code {background:#2D2D2D;}
        .detail-layout {
            padding:24px;
            max-width:900px;
            margin:0 auto;
        }
        .detail-cover {
            width:100%;
            height:320px;
            object-fit:cover;
            border-radius:var(--android-card-radius);
            margin-bottom:24px;
            box-shadow:var(--shadow-1);
        }
        .detail-main-title {
            font-size:32px;
            font-weight:700;
            line-height:1.4;
            margin-bottom:12px;
            color:var(--android-on-surface);
        }
        .detail-sub-title {
            font-size:18px;
            font-weight:400;
            color:var(--android-on-surface-secondary);
            margin-bottom:20px;
        }
        .detail-meta {
            display:flex;
            gap:20px;
            margin-bottom:24px;
            font-size:14px;
            color:var(--android-on-surface-secondary);
        }
        .detail-content {
            font-size:17px;
            line-height:2;
            color:var(--android-on-surface);
            white-space:pre-line;
        }
        .back-btn {
            width:120px;
            height:48px;
            background:var(--android-primary);
            color: var(--toolbar-text);
            border:none;
            border-radius:var(--android-radius);
            margin-top:32px;
            cursor:pointer;
            transition:var(--transition-standard);
        }
        .back-btn:hover {background:var(--android-primary-dark);}
        /* 提示框 */
        .toast {
            position:fixed;
            bottom:30px;
            left:50%;
            transform:translateX(-50%);
            padding:12px 24px;
            background:rgba(0,0,0,0.8);
            color:#fff;
            border-radius:12px;
            opacity:0;
            visibility:hidden;
            transition:0.25s ease;
            z-index:999;
        }
        [data-theme="dark"] .toast {
            background:rgba(255,255,255,0.9);
            color:#000;
        }
        .toast.show {opacity:1;visibility:visible;}
        /* 开关样式 */
        .android-toggle {width:52px;height:32px;position:relative;}
        .android-toggle input {opacity:0;width:0;height:0;}
        .toggle-track {position:absolute;top:0;left:0;right:0;bottom:0;background:#BDBDBD;border-radius:16px;transition:var(--transition-standard);}
        .toggle-thumb {position:absolute;height:24px;width:24px;left:4px;bottom:4px;background:#fff;border-radius:50%;transition:var(--transition-standard);}
        input:checked + .toggle-track {background:var(--android-primary);}
        input:checked + .toggle-track .toggle-thumb {transform:translateX(20px);}
        /* 设置页 */
        .settings-layout {
            padding:24px;
            max-width:700px;
            margin:0 auto;
            display:flex;
            flex-direction:column;
            gap:20px;
        }
        .setting-group {
            background:var(--android-surface);
            border-radius:var(--android-card-radius);
            padding:20px;
            box-shadow:var(--shadow-1);
        }
        .setting-group-title {
            font-size:18px;
            font-weight:500;
            margin-bottom:16px;
            color:var(--android-primary);
        }
        .setting-item {
            height:56px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            margin-bottom:12px;
        }
        .wall-control {
            display:flex;
            flex-direction:column;
            gap:12px;
            margin-top:12px;
        }
        .control-row {
            display:flex;
            align-items:center;
            gap:12px;
        }
        .control-row label {
            width:100px;
            font-size:15px;
        }
        .control-row input[type="range"] {
            flex:1;
            height:6px;
            border-radius:3px;
            background:var(--android-search-bar);
            outline:none;
            -webkit-appearance:none;
        }
        .control-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance:none;
            width:18px;
            height:18px;
            border-radius:50%;
            background:var(--android-primary);
            cursor:pointer;
        }
        .wall-upload-group {
            display:flex;
            gap:12px;
            margin-top:12px;
            flex-wrap:wrap;
        }
        .wall-upload-btn {
            padding:8px 16px;
            background:var(--android-primary);
            color: var(--toolbar-text);
            border-radius:var(--android-radius);
            cursor:pointer;
            transition:var(--transition-standard);
            font-size:14px;
        }
        .wall-upload-btn:hover {background:var(--android-primary-dark);}
        /* 动态壁纸 */
        #wallVideoBg {
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            object-fit:cover;
            z-index:-1;
            display:none;
        }
        /* 关于页 */
        .about-layout {
            padding:24px;
            max-width:600px;
            margin:0 auto;
            text-align:center;
        }
        .about-layout h2 {
            font-size:24px;
            margin-bottom:20px;
            color:var(--android-on-surface);
        }
        .about-layout p {
            line-height:1.8;
            font-size:16px;
            color:var(--android-on-surface);
        }
        .about-layout p a {
            color:var(--android-primary);
            text-decoration:none;
            margin:0 8px;
            transition:var(--transition-standard);
        }
        .about-layout p a:hover {
            text-decoration:underline;
        }
    </style>
</head>
<body>
    <video id="wallVideoBg" loop muted playsinline></video>
    <div class="android-drawer" id="drawer">
        <div class="drawer-header">Caelara Lab</div>
        <div class="drawer-nav">
            <div class="drawer-item active" data-page="home">首页</div>
            <div class="drawer-item" data-page="category">文章分类</div>
            <div class="drawer-item" data-page="publish">发布内容</div>
            <div class="drawer-item" data-page="about">关于</div>
            <div class="drawer-item" data-page="setting">设置</div>
        </div>
    </div>
    <div class="drawer-overlay" id="overlay"></div>

    <div class="android-toolbar">
        <button class="toolbar-menu-btn" id="menuBtn">☰</button>
        <div class="toolbar-title">个人博客</div>
    </div>

    <div class="page-container">
        <!-- 首页 -->
        <div class="page active" id="home">
            <div class="search-main-head">搜索</div>
            <div class="android-search">
                <input type="text" class="search-input" id="homeSearchInput" placeholder="输入关键词搜索内容">
                <button class="search-submit" id="homeSearchBtn">搜索</button>
            </div>
            <div class="search-tags">
                <div class="search-tag">美化</div><div class="search-tag">POV</div><div class="search-tag">其他</div>
                <div class="search-tag">美化教程</div><div class="search-tag">美化预设</div>
            </div>
            <div class="activity-section">
                <img src="https://picsum.photos/800/180?rand=1" alt="活动" class="activity-img">
                <div class="activity-text">技术交流分享会</div>
            </div>
            <div class="articles-wrap" id="homeArticleList">
                <div class="article-card" data-key="美化 教程" data-idx="0">
                    <img src="https://picsum.photos/400/160?a1" class="article-card-img">
                    <div class="article-card-content">
                        <div class="article-card-title">界面美化实战教程</div>
                        <div class="article-card-desc">安卓风格UI美化与适配方案</div>
                    </div>
                </div>
                <div class="empty-tip hide">未找到相关内容</div>
            </div>
        </div>

        <!-- 分类页 -->
        <div class="page" id="category">
            <div class="search-main-head">分类搜索</div>
            <div class="android-search">
                <input type="text" class="search-input" id="cateSearchInput" placeholder="搜索分类">
                <button class="search-submit" id="cateSearchBtn">搜索</button>
            </div>
            <div class="search-tags">
                <div class="search-tag">美化</div><div class="search-tag">POV</div><div class="search-tag">其他</div>
            </div>
            <div class="articles-wrap" id="cateArticleList">
                <div class="article-card" data-cate="美化">
                    <img src="https://picsum.photos/400/160?c1" class="article-card-img">
                    <div class="article-card-content">
                        <div class="article-card-title">美化专区</div>
                        <div class="article-card-desc">UI美化、界面定制相关内容</div>
                    </div>
                </div>
                <div class="empty-tip hide">未找到相关分类</div>
            </div>
        </div>

        <!-- 发布页 -->
        <div class="page" id="publish">
            <div class="publish-layout">
                <h2 class="search-main-head">发布内容</h2>
                <div class="form-group">
                    <label class="form-label">内容大标题 <span>*</span></label>
                    <input type="text" class="form-input" id="artMainTitle" placeholder="请输入内容主标题">
                </div>
                <div class="form-group">
                    <label class="form-label">内容小标题/摘要</label>
                    <input type="text" class="form-input" id="artSubTitle" placeholder="请输入副标题或简介">
                </div>
                <div class="form-group">
                    <label class="form-label">选择分类 <span>*</span></label>
                    <select class="form-select" id="artCate">
                        <option value="美化">美化</option><option value="pov">POV</option><option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">内容封面 <span>*</span></label>
                    <div class="cover-box">
                        <img id="coverPreview" src="https://picsum.photos/140/140?gray">
                        <label class="upload-btn">上传封面图<input type="file" id="coverFile" accept="image/*" style="display:none"></label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">内容编辑</label>
                    <div class="editor-toolbar">
                        <button class="editor-btn" title="加粗文本" id="btnBold">B</button>
                        <button class="editor-btn" title="插入标题" id="btnTitle">H</button>
                        <button class="editor-btn" title="插入换行" id="btnBreak">↵</button>
                        <button class="editor-btn" title="插入分段" id="btnPara">¶</button>
                        <button class="editor-btn" title="清除格式" id="btnClear">C</button>
                        <label class="upload-btn" style="padding:6px 12px;">上传图片<input type="file" id="photoFile" accept="image/*" multiple style="display:none"></label>
                        <label class="word-import-btn" style="padding:6px 12px;">导入Word<input type="file" id="wordFile" accept=".doc,.docx" style="display:none"></label>
                    </div>
                    <div class="photo-group" id="photoPreviewGroup"></div>
                    <select class="code-lang" id="codeLang">
                        <option value="html">HTML</option><option value="css">CSS</option><option value="js">JavaScript</option><option value="other">其他代码</option>
                    </select>
                    <textarea class="code-textarea" id="codeContent" placeholder="请输入需要发布的代码内容"></textarea>
                    <textarea class="form-textarea" id="artContent" placeholder="请输入正文内容"></textarea>
                </div>
                <div class="btn-group">
                    <button class="draft-btn" id="draftBtn">保存草稿</button>
                    <button class="submit-btn" id="publishBtn">发布内容</button>
                </div>
            </div>
        </div>

        <!-- 详情页 -->
        <div class="page" id="detail">
            <div class="detail-layout">
                <img id="detailCover" class="detail-cover" src="">
                <h1 id="detailMainTitle" class="detail-main-title"></h1>
                <h2 id="detailSubTitle" class="detail-sub-title"></h2>
                <div class="detail-meta"><span id="detailCate"></span><span id="detailTime"></span></div>
                <div class="detail-photos" id="detailPhotos"></div>
                <div class="detail-code" id="detailCode"></div>
                <div id="detailContent" class="detail-content"></div>
                <button class="back-btn" id="backBtn">返回首页</button>
            </div>
        </div>

        <!-- 关于页 -->
        <div class="page" id="about">
            <div class="about-layout">
                <h2>关于本站</h2>
                <p>基于安卓Material You风格搭建的内容发布博客</p>
                <p style="margin-top:12px;">
                    <a href="https://github.com" target="_blank">GitHub</a>
                    <a href="https://bilibili.com" target="_blank">B站</a>
                    <a href="mailto:demo@demo.com">联系邮箱</a>
                </p>
            </div>
        </div>

        <!-- 设置页 -->
        <div class="page" id="setting">
            <div class="settings-layout">
                <div class="setting-group">
                    <div class="setting-group-title">基础设置</div>
                    <div class="setting-item">
                        <span>深色模式</span>
                        <label class="android-toggle"><input type="checkbox" id="darkToggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></label>
                    </div>
                    <div class="setting-item">
                        <span>主题颜色</span>
                        <input type="color" id="nativeColor" value="#2979FF" style="width:40px;height:40px;border:none;border-radius:50%;">
                    </div>
                </div>
                <div class="setting-group">
                    <div class="setting-group-title">壁纸设置</div>
                    <div class="setting-item">
                        <span>静态壁纸</span>
                        <label class="android-toggle"><input type="checkbox" id="wallTypeToggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></label>
                        <span style="margin-left:8px;">动态壁纸</span>
                    </div>
                    <div class="wall-control">
                        <div class="control-row"><label>缩放比例</label><input type="range" id="scaleRange" min="1" max="2" step="0.05" value="1"></div>
                        <div class="control-row" id="volumeRow" style="display:none;"><label>视频音量</label><input type="range" id="volumeRange" min="0" max="1" step="0.05" value="0"></div>
                    </div>
                    <div class="wall-upload-group">
                        <label class="wall-upload-btn">上传静态壁纸<input type="file" id="staticFile" accept="image/*" style="display:none"></label>
                        <label class="wall-upload-btn">上传动态壁纸<input type="file" id="dynamicFile" accept="video/*" style="display:none"></label>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        // 水波纹动画
        function createRipple(e){
            const btn=e.currentTarget,c=document.createElement('span');
            const d=Math.max(btn.clientWidth,btn.clientHeight),r=d/2;
            c.style.width=c.style.height=d+'px';
            c.style.left=e.clientX-btn.getBoundingClientRect().left-r+'px';
            c.style.top=e.clientY-btn.getBoundingClientRect().top-r+'px';
            c.classList.add('ripple');btn.appendChild(c);
            setTimeout(()=>c.remove(),600);
        }
        document.querySelectorAll('.toolbar-menu-btn,.search-submit,.drawer-item,.upload-btn,.word-import-btn,.draft-btn,.submit-btn,.back-btn,.wall-upload-btn,.search-tag,.editor-btn').forEach(i=>i.addEventListener('click',createRipple));

        // 侧边栏控制
        const menuBtn=document.getElementById('menuBtn'),drawer=document.getElementById('drawer'),overlay=document.getElementById('overlay');
        menuBtn.onclick=()=>{drawer.classList.add('active');overlay.classList.add('active');};
        overlay.onclick=()=>{drawer.classList.remove('active');overlay.classList.remove('active');};

        // 页面切换
        document.querySelectorAll('.drawer-item').forEach(item=>{
            item.onclick=()=>{
                const t=item.dataset.page;
                document.querySelectorAll('.drawer-item').forEach(i=>i.classList.remove('active'));
                document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
                item.classList.add('active');
                document.getElementById(t).classList.add('active');
                drawer.classList.remove('active');overlay.classList.remove('active');
            }
        });

        // 提示框
        const toast=document.getElementById('toast');
        const showToast=(msg)=>{toast.innerText=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);};

        // 主题色亮度计算
        function getBrightness(hex){
            hex=hex.replace('#','');
            const r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);
            return (r*299+g*587+b*114)/1000;
        }

        // 主题色更新（深色模式不改变主题色）
        function updateTheme(){
            const c=document.getElementById('nativeColor').value;
            document.documentElement.style.setProperty('--android-primary',c);
            document.documentElement.style.setProperty('--android-primary-dark',c);
            document.documentElement.style.setProperty('--toolbar-text',getBrightness(c)<130?'#FFF':'#000');
            localStorage.setItem('themeColor',c);
        }

        // 封面上传
        const coverFile=document.getElementById('coverFile'),coverPreview=document.getElementById('coverPreview');
        coverFile.onchange=(e)=>{
            const f=e.target.files[0];if(!f||!f.type.startsWith('image/'))return showToast('请选择有效图片');
            const r=new FileReader();r.onload=()=>{coverPreview.src=r.result;showToast('封面上传成功');};r.readAsDataURL(f);
        };

        // 图片上传
        const photoFile=document.getElementById('photoFile'),photoGroup=document.getElementById('photoPreviewGroup');
        let photoList=[];
        photoFile.onchange=(e)=>{
            const files=e.target.files;if(!files.length)return;
            photoGroup.innerHTML='';photoList=[];
            Array.from(files).forEach(f=>{
                if(!f.type.startsWith('image/'))return;
                const r=new FileReader();
                r.onload=()=>{photoList.push(r.result);const img=document.createElement('img');img.src=r.result;img.className='photo-item';photoGroup.appendChild(img);};
                r.readAsDataURL(f);
            });
            showToast('图片上传成功');
        };

        // docx导入（修复乱码）
        const wordFile=document.getElementById('wordFile'),artContent=document.getElementById('artContent');
        wordFile.onchange=async (e)=>{
            const f=e.target.files[0];if(!f)return;
            try{
                const buf=await f.arrayBuffer();
                const res=await mammoth.extractRawText({arrayBuffer:buf});
                artContent.value = res.value;
                showToast('Word导入成功');
            }catch(err){showToast('Word导入失败');}
        };

        // 文章编辑深度优化【核心新增】
        const btnBold = document.getElementById('btnBold');
        const btnTitle = document.getElementById('btnTitle');
        const btnBreak = document.getElementById('btnBreak');
        const btnPara = document.getElementById('btnPara');
        const btnClear = document.getElementById('btnClear');
        const artTextarea = document.getElementById('artContent');

        // 光标位置插入文本
        function insertTextAtCursor(textarea, text) {
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const val = textarea.value;
            textarea.value = val.substring(0, start) + text + val.substring(end);
            textarea.selectionStart = textarea.selectionEnd = start + text.length;
            textarea.focus();
        }

        // 加粗文本
        btnBold.onclick = () => {
            const start = artTextarea.selectionStart;
            const end = artTextarea.selectionEnd;
            const val = artTextarea.value;
            if(start === end) {
                showToast('请先选中需要加粗的文本');
                return;
            }
            const selected = val.substring(start, end);
            artTextarea.value = val.substring(0, start) + `**${selected}**` + val.substring(end);
            artTextarea.selectionStart = start;
            artTextarea.selectionEnd = end + 4;
            artTextarea.focus();
            btnBold.classList.add('active');
            showToast('文本加粗成功');
        };

        // 插入标题
        btnTitle.onclick = () => {
            insertTextAtCursor(artTextarea, '## 标题\n');
            btnTitle.classList.add('active');
            showToast('标题插入成功');
        };

        // 插入换行
        btnBreak.onclick = () => {
            insertTextAtCursor(artTextarea, '\n');
            btnBreak.classList.add('active');
            showToast('换行插入成功');
        };

        // 插入分段
        btnPara.onclick = () => {
            insertTextAtCursor(artTextarea, '\n\n');
            btnPara.classList.add('active');
            showToast('分段插入成功');
        };

        // 清除格式
        btnClear.onclick = () => {
            artTextarea.value = artTextarea.value.replace(/\*\*(.*?)\*\*/g, '$1').replace(/##\s/g, '');
            btnClear.classList.add('active');
            showToast('格式清除成功');
            setTimeout(()=>document.querySelectorAll('.editor-btn').forEach(b=>b.classList.remove('active')),500);
        };

        // 文章列表渲染
        let articleList=JSON.parse(localStorage.getItem('articleList'))||[];
        const homeWrap=document.getElementById('homeArticleList');
        function renderArticles(){
            homeWrap.querySelectorAll('.article-card[data-idx]').forEach(c=>c.remove());
            const tip=homeWrap.querySelector('.empty-tip');
            if(articleList.length===0)return tip.classList.remove('hide');
            tip.classList.add('hide');
            articleList.forEach((item,idx)=>{
                const card=document.createElement('div');
                card.className='article-card';card.dataset.key=`${item.cate} ${item.mainTitle}`;card.dataset.idx=idx;
                card.innerHTML=`<img src="${item.cover}" class="article-card-img"><div class="article-card-content"><div class="article-card-title">${item.mainTitle}</div><div class="article-card-desc">${item.subTitle}</div></div>`;
                homeWrap.insertBefore(card,tip);
                card.onclick=()=>{
                    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
                    document.getElementById('detail').classList.add('active');
                    document.getElementById('detailCover').src=item.cover;
                    document.getElementById('detailMainTitle').innerText=item.mainTitle;
                    document.getElementById('detailSubTitle').innerText=item.subTitle;
                    document.getElementById('detailCate').innerText=`分类：${item.cate}`;
                    document.getElementById('detailTime').innerText=`时间：${item.time}`;
                    const photoBox=document.getElementById('detailPhotos');photoBox.innerHTML='';
                    if(item.photoList)item.photoList.forEach(p=>{const img=document.createElement('img');img.src=p;img.className='detail-photo';photoBox.appendChild(img);});
                    document.getElementById('detailCode').innerText=item.codeContent||'';
                    document.getElementById('detailContent').innerText=item.content.replace(/\*\*(.*?)\*\*/g, '$1').replace(/##\s/g, '');
                };
            });
        }
        renderArticles();

        // 草稿保存
        document.getElementById('draftBtn').onclick=()=>{
            const mainTitle=document.getElementById('artMainTitle').value.trim();
            if(!mainTitle)return showToast('标题不能为空');
            const data={
                mainTitle:document.getElementById('artMainTitle').value,subTitle:document.getElementById('artSubTitle').value,
                cate:document.getElementById('artCate').value,cover:coverPreview.src,photoList,
                codeLang:document.getElementById('codeLang').value,codeContent:document.getElementById('codeContent').value,
                content:artContent.value,time:new Date().toLocaleString()
            };
            localStorage.setItem('articleDraft',JSON.stringify(data));
            showToast('草稿保存成功');
        };

        // 文章发布
        document.getElementById('publishBtn').onclick=()=>{
            const mainTitle=document.getElementById('artMainTitle').value.trim(),cover=coverPreview.src;
            if(!mainTitle||cover.includes('gray'))return showToast('标题/封面不能为空');
            articleList.unshift({
                mainTitle,subTitle:document.getElementById('artSubTitle').value,cate:document.getElementById('artCate').value,
                cover,photoList,codeLang:document.getElementById('codeLang').value,codeContent:document.getElementById('codeContent').value.trim(),
                content:artContent.value,time:new Date().toLocaleString()
            });
            localStorage.setItem('articleList',JSON.stringify(articleList));
            showToast('发布成功');
            renderArticles();
            document.querySelector('.drawer-item[data-page="home"]').click();
        };

        // 详情页返回
        document.getElementById('backBtn').onclick=()=>{
            document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
            document.getElementById('home').classList.add('active');
        };

        // 首页搜索
        const homeSearch=document.getElementById('homeSearchBtn'),homeInput=document.getElementById('homeSearchInput');
        const filterHome=()=>{
            const k=homeInput.value.trim().toLowerCase();
            document.querySelectorAll('#homeArticleList .article-card[data-idx]').forEach(c=>{
                c.classList.toggle('hide',k&&!c.dataset.key.includes(k));
            });
        };
        homeSearch.onclick=filterHome;homeInput.onkeypress=(e)=>e.key==='Enter'&&filterHome();

        // 分类搜索
        const cateSearch=document.getElementById('cateSearchBtn'),cateInput=document.getElementById('cateSearchInput');
        const filterCate=()=>{
            const k=cateInput.value.trim().toLowerCase();
            document.querySelectorAll('#cateArticleList .article-card[data-cate]').forEach(c=>{
                c.classList.toggle('hide',k&&!c.dataset.cate.includes(k));
            });
        };
        cateSearch.onclick=filterCate;cateInput.onkeypress=(e)=>e.key==='Enter'&&filterCate();

        // 标签筛选
        document.querySelectorAll('.search-tag').forEach(tag=>{
            tag.onclick=()=>{
                const v=tag.innerText;
                if(document.getElementById('home').classList.contains('active')){homeInput.value=v;filterHome();}
                if(document.getElementById('category').classList.contains('active')){cateInput.value=v;filterCate();}
            };
        });

        // 深色模式切换
        const darkToggle=document.getElementById('darkToggle');
        darkToggle.onchange=()=>{
            document.body.dataset.theme=darkToggle.checked?'dark':'';
            localStorage.setItem('theme',darkToggle.checked?'dark':'light');
        };

        // 主题色选择
        const nativeColor=document.getElementById('nativeColor');
        nativeColor.oninput=updateTheme;

        // 壁纸功能
        const wallTypeToggle=document.getElementById('wallTypeToggle'),scaleRange=document.getElementById('scaleRange');
        const volumeRange=document.getElementById('volumeRange'),volumeRow=document.getElementById('volumeRow');
        const staticFile=document.getElementById('staticFile'),dynamicFile=document.getElementById('dynamicFile'),wallVideoBg=document.getElementById('wallVideoBg');

        wallTypeToggle.onchange=()=>{
            if(wallTypeToggle.checked){volumeRow.style.display='flex';wallVideoBg.style.display='block';}
            else{volumeRow.style.display='none';wallVideoBg.style.display='none';wallVideoBg.pause();}
        };
        scaleRange.oninput=()=>{document.body.style.backgroundSize=`${scaleRange.value*100}%`;wallVideoBg.style.transform=`scale(${scaleRange.value})`;};
        volumeRange.oninput=()=>{wallVideoBg.volume=volumeRange.value;wallVideoBg.muted=volumeRange.value<=0;};
        staticFile.onchange=(e)=>{
            const f=e.target.files[0];if(!f||!f.type.startsWith('image/'))return;
            document.body.style.backgroundImage=`url(${URL.createObjectURL(f)})`;
            wallVideoBg.style.display='none';wallTypeToggle.checked=false;volumeRow.style.display='none';
            showToast('静态壁纸应用成功');
        };
        dynamicFile.onchange=(e)=>{
            const f=e.target.files[0];if(!f||!f.type.startsWith('video/'))return;
            wallVideoBg.src=URL.createObjectURL(f);wallVideoBg.style.display='block';wallVideoBg.play();
            wallTypeToggle.checked=true;volumeRow.style.display='flex';
            showToast('动态壁纸应用成功');
        };

        // 页面初始化
        document.addEventListener('DOMContentLoaded',()=>{
            const t=localStorage.getItem('theme'),c=localStorage.getItem('themeColor');
            if(t==='dark'){document.body.dataset.theme='dark';darkToggle.checked=true;}
            if(c){nativeColor.value=c;updateTheme();}
            const draft=JSON.parse(localStorage.getItem('articleDraft'));
            if(draft){
                document.getElementById('artMainTitle').value=draft.mainTitle||'';
                document.getElementById('artSubTitle').value=draft.subTitle||'';
                document.getElementById('artCate').value=draft.cate||'美化';
                artContent.value=draft.content||'';
                document.getElementById('codeContent').value=draft.codeContent||'';
                coverPreview.src=draft.cover||'https://picsum.photos/140/140?gray';
                if(draft.photoList){photoList=draft.photoList;draft.photoList.forEach(p=>{
                    const img=document.createElement('img');img.src=p;img.className='photo-item';photoGroup.appendChild(img);
                });}
            }
        });
    </script>
</body>
</html>
