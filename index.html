function renderWall(type){const wrap=$("wallpaper"),img=$("staticWall"),video=$("dynamicWall"),audioCtrl=$("audioControl"),audioSw=$("audioSwitch"),body=document.body;img.style.display="none";video.style.display="none";video.pause();wrap.classList.remove("show");body.classList.remove("has-wallpaper");audioCtrl.classList.remove("show");if(type==="static"&&wallData.static){img.src=wallData.static;img.style.display="block";wrap.classList.add("show");body.classList.add("has-wallpaper");wallData.type="static";try{localStorage.setItem("wall_static",wallData.static)}catch{};toast("✅ 静态壁纸已生效")}if(type==="dynamic"&&wallData.dynamic){video.src=wallData.dynamic;video.volume=wallData.volume;video.muted=!wallData.audio;video.style.display="block";wrap.classList.add("show");body.classList.add("has-wallpaper");audioCtrl.classList.add("show");audioSw.classList.toggle("active",wallData.audio);video.play().catch(err=>{video.muted=true;audioSw.classList.remove("active");wallData.audio=false;video.play().catch(e=>toast("⚠️ 视频播放失败"))});wallData.type="dynamic";try{localStorage.setItem("wall_dynamic",wallData.dynamic)}catch{};toast("✅ 动态壁纸已生效")}if(type==="close"){img.style.display="none";video.style.display="none";video.pause();wrap.classList.remove("show");body.classList.remove("has-wallpaper");audioCtrl.classList.remove("show");wallData.type="close";localStorage.setItem("wall_type","close");toast("壁纸已关闭")}}
function uploadStaticWall(input){const file=input.files?.[0];if(!file)return;if(!['image/jpeg','image/jpg','image/png','image/webp'].includes(file.type)){toast("❌ 仅支持jpg、png、webp格式图片");input.value="";return;}if(file.size>10*1024*1024){toast("❌ 图片不能超过10MB");input.value="";return;}toast("正在读取图片...");const reader=new FileReader();reader.onload=e=>{wallData.static=e.target.result;renderWall("static");input.value=""};reader.onerror=()=>{toast("❌ 图片读取失败");input.value=""};reader.readAsDataURL(file)}

function runTypewriter(){const dom=$("typewriter");if(!dom||!dom.textContent){requestAnimationFrame(runTypewriter);return;}const texts=typeTextList;let txtIndex=0,charIndex=0,isDeleting=false;const typeSpeed=100,deleteSpeed=50,pauseTime=1500;function type(){const currentText=texts[txtIndex];if(!isDeleting){dom.textContent=currentText.slice(0,charIndex+1);charIndex++;if(charIndex>currentText.length){isDeleting=true;setTimeout(type,pauseTime);return;}}else{dom.textContent=currentText.slice(0,charIndex-1);charIndex--;if(charIndex<0){isDeleting=false;txtIndex=(txtIndex+1)%texts.length;charIndex=0;setTimeout(type,300);return;}}setTimeout(type,isDeleting?deleteSpeed:typeSpeed)}type()}
function renderBanner(){let html="";if(Array.isArray(banners))banners.forEach((e,i)=>{html+=`<div class="banner-item"><img src="${escapeHtml(e.img)}" class="banner-img" loading="lazy"><div class="banner-text">${escapeHtml(e.text)}</div></div>`});$("bannerTrack").innerHTML=html;let dot="";if(Array.isArray(banners))banners.forEach((e,i)=>{dot+=`<div class="banner-dot ${0===i?"active":""} touch-reset" onclick="goBanner(${i})"></div>`});$("banner-dots").innerHTML=dot}
function initIcons(){document.querySelectorAll(".nav-icon").forEach((e,i)=>{const val=Object.values(ICONS)[i];if(val)e.innerHTML=val});document.querySelector(".toggle-icon").innerHTML=ICONS.toggle;document.querySelectorAll(".bottom-item").forEach((e,i)=>{const val=Object.values(ICONS)[i];if(val)e.innerHTML=val})}
function getRealGistId(){try{let e=atob(ENC_GIST),t=Array.from(e).map((e,t)=>String.fromCharCode(e.charCodeAt(0)-3)).join(""),n=Array.from(t).map((e,t)=>String.fromCharCode(e.charCodeAt(0)^ENCRYPT_KEY.charCodeAt(t%ENCRYPT_KEY.length))).join("");return n.trim()}catch{return""}}
function loadGistData(){const e=getRealGistId();if(e&&/^[a-zA-Z0-9]{32}$/.test(e)){toast("正在加载内容...");fetch(`https://api.github.com/gists/${e}`,{method:"GET",headers:{Accept:"application/vnd.github.v3+json","X-GitHub-Api-Version":"2022-11-28"}}).then(e=>{if(!e.ok)throw new Error;return e.json()}).then(e=>{const t=e.files?.["data.json"];if(t){const data=safeParse(t.content,{});if(Array.isArray(data.arts))arts=data.arts;if(Array.isArray(data.cates))cates=data.cates;if(Array.isArray(data.banners))banners=data.banners;renderBanner();renderCateSelect();$("aboutTotal").innerText=arts.filter(e=>e&&e.status==="published").length;$("aboutCate").innerText=cates.length;toast("内容加载成功")}}).catch(()=>toast("内容加载失败"))}}

document.addEventListener("visibilitychange",()=>{const video=$("dynamicWall");if(document.hidden){if(bannerTimer)clearInterval(bannerTimer);if(!video.paused)video.pause()}else{if(!bannerTimer)bannerTimer=setInterval(()=>{bannerIdx=(bannerIdx+1)%banners.length;goBanner(bannerIdx)},5000);if(wallData.type==="dynamic"&&video.paused)video.play().catch(()=>{})}});
window.onscroll=()=>{$("readProgress").style.width=(document.documentElement.scrollTop/(document.documentElement.scrollHeight-document.documentElement.clientHeight))*100+"%";$("backTop").classList.toggle("show",document.documentElement.scrollTop>300)};
document.addEventListener("DOMContentLoaded",()=>{initIcons();const isDark="dark"===localStorage.getItem("cae_theme");if(isDark){document.body.classList.add("dark");$("themeSwitch").classList.add("active",isDark)}const themeColor=localStorage.getItem("cae_theme_color")||DEFAULT_THEME_COLOR;setTheme(themeColor);const opacity=safeNum(localStorage.getItem("wall_opacity"),30);$("opacitySlider").value=opacity;$("opacityText").innerText=opacity+"%";document.documentElement.style.setProperty("--wall-opacity",opacity/100);const volume=safeNum(localStorage.getItem("wall_volume"),0.5);$("volumeSlider").value=volume*100;$("volumeText").innerText=volume*100+"%";wallData.static=safeStr(localStorage.getItem("wall_static"));wallData.dynamic=safeStr(localStorage.getItem("wall_dynamic"));wallData.type=safeStr(localStorage.getItem("wall_type"),"close");wallData.audio=localStorage.getItem("wall_audio")==="1";wallData.volume=safeNum(localStorage.getItem("wall_volume"),0.5);$("audioSwitch").classList.toggle("active",wallData.audio);if(wallData.type!=="close"&&wallData[wallData.type])renderWall(wallData.type);renderHomeList();renderCateSelect();renderSearchHistory();renderBanner();$("aboutTotal").innerText=arts.filter(e=>e&&e.status==="published").length;$("aboutCate").innerText=cates.length;loadGistData();bannerTimer=setInterval(()=>{bannerIdx=(bannerIdx+1)%banners.length;goBanner(bannerIdx)},5000);runTypewriter()});
</script></body></html>
